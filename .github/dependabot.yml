version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      sanity:
        patterns:
          - sanity
          - '@sanity/*'
          - next-sanity
      testing:
        patterns:
          - vitest
          - '@testing-library/*'
          - jsdom
      vercel:
        patterns:
          - '@vercel/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
